gatling {
  core {
    # Режим запуска: local (однопроцессный) или enterprise (распределенный)
    mode = local

    # Директория результатов
    outputDirectoryBaseName = "gatling"

    # Использованная память при запуске (процент)
    # charting {
    #   maxPlotSize = 10000
    # }

    # Опции для JVM при запуске Gatling
    # jvmArgs = ["-server", "-Xmx2G"]

    # Проверка на окончание по таймауту
    # shutdownTimeout = 10000
  }

  http {
    # Настройки HTTP клиента
    # enableHttp2 = true
    
    # Timeout для подключения (мс)
    # connectTimeout = 10000
    
    # Timeout для запроса (мс)
    # requestTimeout = 60000
    
    # Максимальное количество переадресаций
    # maxRedirects = 5
    
    # Максимальный размер ответа (байты)
    # maxResponseSize = 10485760  # 10 MB
    
    # Используемые сокеты
    # useNettyNettyBackend = true
    
    # Cookie policy (strict, lax, none)
    # cookiePolicy = "lax"
  }

  charting {
    # Настройки графиков в отчете
    maxPlotSize = 10000
    accuracy = 10  # точность в процентах
  }

  reports {
    # Директория отчетов
    # resultsDirectory = "results"
    
    # Имя симуляции в отчете
    # simulationDateFormat = "yyyyMMdd_HHmmss"
  }
}
