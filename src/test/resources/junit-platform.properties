# Включить параллельное выполнение
junit.jupiter.execution.parallel.enabled = true

# Режим по умолчанию для всех тестов: concurrent (параллельно) или same_thread (последовательно)
junit.jupiter.execution.parallel.mode.default = concurrent

# Стратегия конфигурации пула потоков: fixed (фиксированное число)
junit.jupiter.execution.parallel.config.strategy = fixed

# Количество параллельных потоков (настройте под свои ресурсы)
junit.jupiter.execution.parallel.config.fixed.parallelism = 4